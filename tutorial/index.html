<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Legal History Hub – Tutorial</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%232c5aa0'/%3E%3Ctext x='16' y='24' font-size='22' text-anchor='middle' fill='white' font-family='Georgia,serif'%3EL%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #2c5aa0;
      --sidebar-width: 260px;
      --content-max-width: 800px;
    }
  </style>
</head>
<body>
  <div id="app">Laden...</div>
  <script>
    window.$docsify = {
      name: 'Legal History Hub – Tutorial',
      nameLink: '#/',
      loadSidebar: true,
      mergeNavbar: true,
      subMaxLevel: 2,
      auto2top: true,
      notFoundPage: true,
      alias: {
        '/slides/_sidebar.md': '/_sidebar.md'
      },
      search: {
        placeholder: 'Suche...',
        noData: 'Keine Ergebnisse.',
        depth: 3,
        paths: [
          '/',
          '/01-genai-und-prompt-engineering',
          '/02-preparation-und-role-models',
          '/glossar',
          '/slides/ws1-genai-fundamentals',
          '/slides/ws2-web-promptotyping-claude-code'
        ]
      },
      pagination: {
        previousText: '← Vorherige Lektion',
        nextText: 'Nächste Lektion →',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: 'Kopieren',
        successText: 'Kopiert!'
      }
    }
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
