<h1 id="terms-you-will-hear-today-12">Terms you will hear today (1/2)</h1>
<div class="small">
<table>
<thead>
<tr>
<th>Term</th>
<th>Short</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>FAIR</strong></td>
<td>Findable, Accessible, Interoperable, Reusable (data quality principle)</td>
</tr>
<tr>
<td><strong>PID</strong></td>
<td>Persistent Identifier, e.g. ORCID, GND, ROR, Wikidata Q-number</td>
</tr>
<tr>
<td><strong>Authority file</strong></td>
<td>central list of names with their IDs</td>
</tr>
<tr>
<td><strong>Foreign Key</strong></td>
<td>reference into another table (here: <code>project_id</code>)</td>
</tr>
<tr>
<td><strong>Junction Table</strong></td>
<td>table that resolves a Many-to-Many relationship</td>
</tr>
<tr>
<td><strong>Many-to-Many</strong></td>
<td>one project has many people, one person has many projects</td>
</tr>
</tbody>
</table>
</div>

<h1 id="terms-you-will-hear-today-22">Terms you will hear today (2/2)</h1>
<div class="small">
<table>
<thead>
<tr>
<th>Term</th>
<th>Short</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Singleton</strong></td>
<td>field with exactly one value per entity (e.g. title)</td>
</tr>
<tr>
<td><strong>Source of Truth</strong></td>
<td>the one place where the correct value lives</td>
</tr>
<tr>
<td><strong>Wide / Long / Tidy</strong></td>
<td>data formats (covered in detail shortly)</td>
</tr>
<tr>
<td><strong>1NF</strong></td>
<td>First Normal Form: each cell holds exactly one value</td>
</tr>
<tr>
<td><strong>Enum</strong></td>
<td>closed list of values (e.g. status: <code>active</code>, <code>completed</code>, <code>planned</code>)</td>
</tr>
<tr>
<td><strong>Spill Range</strong></td>
<td>formula that automatically fills several result rows</td>
</tr>
</tbody>
</table>

<p><strong>Conceptually clean:</strong> local IDs (<code>pers-003</code>, <code>subj-001</code>), ORCIDs, GND numbers. That is <strong>relational thinking</strong> and fundamentally right.</p>

<h1 id="what-the-pilot-model-got-right">What the pilot model got right</h1>
<p><img src="ws3-img/pilot-persons.png" alt="persons tab with local IDs and ORCIDs" /></p>
<p>Every person has a local ID and an <strong>ORCID</strong> (persistent identifier for researchers). That is <strong>FAIR-aligned</strong> (Findable, Accessible, Interoperable, Reusable, Wilkinson et al. 2016): PIDs make data findable and linkable. We keep this idea.</p>
<div class="small">
<p>Wilkinson, M. D. et al. &quot;The FAIR Guiding Principles for scientific data management and stewardship.&quot; <em>Scientific Data</em> 3, 2016. <a href="https://doi.org/10.1038/sdata.2016.18">https://doi.org/10.1038/sdata.2016.18</a></p>
</div>

<h1 id="why-is-this-a-problem">Why is this a problem?</h1>
<p>Database theory has a rule called the <strong>First Normal Form (1NF)</strong>:</p>
<blockquote>
<p><em>&quot;An entry in a table is not decomposable.&quot;</em><br />
– Edgar F. Codd, <em>A Relational Model of Data for Large Shared Data Banks</em>, 1970.</p>
</blockquote>
<p>Codd was an IBM researcher and the inventor of relational databases. His rule says: <strong>a cell holds exactly one value.</strong> No lists, no separators.</p>
<p><img src="ws3-img/pilot-keywords.png" alt="keywords_de column with semicolon-separated lists" /></p>
<p>The same pattern everywhere. In real databases this works because the database parses internally. <strong>Sheets is not a database.</strong></p>
</section>

<h1 id="why-many-columns-dont-help-either">Why many columns don't help either</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>| project_id | person_1 | role_1 | person_2 | role_2 | ... | person_15 |
|------------|----------|--------|----------|--------|-----|-----------|
| proj-001   | Duve     | PI     | L-B      | PI     | ... |           |
</code></pre>
<p>How many column pairs are enough? With 3 people, 12 columns sit empty. With 20, you would have to change the table structure.</p>
<p>A table full of empty cells, endless horizontal scrolling, a hard upper limit. In DB theory: <strong>Repeating Groups</strong> (Codd 1970).</p>

<h1 id="three-formats-compared">Three formats compared</h1>
<div class="small">
<table>
<thead>
<tr>
<th>Format</th>
<th>What it looks like</th>
<th>Problem</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Wide + separator lists</strong></td>
<td><code>creator = &quot;Duve, T.; L-B, M.&quot;</code> in one cell</td>
<td>Sheets sees only text, no filtering/counting</td>
</tr>
<tr>
<td><strong>Relational normalised</strong></td>
<td>dedicated people table, only IDs in projects</td>
<td>Sheets has no joins, humans have to merge mentally</td>
</tr>
<tr>
<td><strong>Hybrid (wide + long)</strong></td>
<td>wide for singletons, long tab for relationships</td>
<td>redundancy in title columns, but Sheets-friendly</td>
</tr>
</tbody>
</table>
</div>
<p>The pilot model was format 2 (plus separator lists). Today we build format 3.</p>
<p><strong>Why not format 2?</strong> Because Sheets is a user interface, not a database. Humans read, click, filter. Joins do not exist there.</p>
</section>

<h1 id="the-solution-a-dedicated-tab-in-long-format">The solution: a dedicated tab in long format</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>| project_id | person              | role               |
|------------|---------------------|--------------------|
| proj-001   | Duve, Thomas        | PI                 |
| proj-001   | Lutz-Bachmann, M.   | PI                 |
| proj-001   | König, Florian      | researcher         |
| proj-002   | Collin, Peter       | PI                 |
</code></pre>
<p>One row per person-project-role. This is called the <strong>long format</strong>.</p>
<blockquote>
<p><em>&quot;Each variable is a column, each observation is a row.&quot;</em> – Hadley Wickham, <em>Tidy Data</em>, 2014.</p>
</blockquote>
<p>The tab itself is a <strong>junction table</strong>: a table that resolves a many-to-many relationship.</p>

<h1 id="wide-vs-long-two-formats">Wide vs. long: two formats</h1>
<div class="columns">
<div>
<p><strong>Wide</strong></p>
<ul>
<li>one row per project</li>
<li>many columns side by side</li>
<li>good for <strong>singletons</strong>: fields with exactly one value (title, status, year)</li>
<li>example: our <code>core</code> tab</li>
</ul>
</div>
<div>
<p><strong>Long (tidy)</strong></p>
<ul>
<li>one row per relationship/fact</li>
<li>few columns, many rows</li>
<li>good for <strong>many-to-many</strong>: fields with many values (people, keywords)</li>
<li>example: our <code>people</code> tab</li>
</ul>
</div>
</div>
<p>Humans read wide well. Sheets functions (filter, sort, group) work well on long. Our hybrid serves both.</p>
</section>

<h1 id="the-rule-of-thumb">The rule of thumb</h1>
<table>
<thead>
<tr>
<th>If a field ...</th>
<th>Then ...</th>
</tr>
</thead>
<tbody>
<tr>
<td>has exactly <strong>one</strong> value (title, status, start year)</td>
<td><strong>wide</strong> in <code>core</code></td>
</tr>
<tr>
<td>has 1-N values, N <strong>small and fixed</strong> (max. 3 URLs)</td>
<td><strong>wide</strong> with <code>url1</code>, <code>url2</code>, <code>url3</code></td>
</tr>
<tr>
<td>has <strong>unbounded</strong> values (people, keywords)</td>
<td><strong>long</strong> in a dedicated tab</td>
</tr>
</tbody>
</table>
<p>Rule of thumb: <em>can a project have several of these? Then long.</em></p>
</section>

<h1 id="our-hybrid-model">Our hybrid model</h1>
<table>
<thead>
<tr>
<th>Tab</th>
<th>Format</th>
<th>Content</th>

<td>long</td>
<td>one person-role per row</td>
</tr>
<tr>
<td><code>institutions</code></td>
<td>long</td>
<td>one institutional relationship per row</td>
</tr>
<tr>
<td><code>subjects</code></td>
<td>long</td>
<td>one subject per row</td>
</tr>
<tr>
<td><code>regions</code></td>
<td>long</td>
<td>one region per row</td>
</tr>
<tr>
<td><code>keywords</code></td>
<td>long</td>
<td>one keyword per row</td>
</tr>
</tbody>
</table>
<p><strong>Why &quot;hybrid&quot;?</strong> Because we don't pick &quot;either wide or long&quot;. We use both side by side. Each field goes into the format that fits its cardinality.</p>

<h1 id="lessons-from-the-pilot-experiment">Lessons from the pilot experiment</h1>
<ol>
<li>
<p><strong>Relational thinking is valuable.</strong> Local IDs, ORCIDs, lookup tables. We keep these.</p>
</li>
<li>
<p><strong>Separator lists do not fit Sheets.</strong> The <code>creator</code> column with 9 pipe-separated entries is unusable for humans and for Sheets.</p>
</li>
<li>
<p><strong>Sheets is an editor, not a database.</strong> The data model has to be written for humans. The power (joins, enrichment) emerges at build time in Claude Code.</p>
</li>
</ol>
<p>Modeling is a conversation, not a one-shot.</p>
</section>

<h1 id="two-ais-in-the-same-sheet-a-cautionary-tale">Two AIs in the same Sheet: a cautionary tale</h1>
<p>During workshop preparation, two AIs worked on this Sheet in parallel:</p>
<ul>
<li><strong>Claude</strong> via the &quot;Claude in Chrome&quot; browser extension (drives a visible Chrome tab: navigates, clicks, reads cells, takes screenshots)</li>
<li><strong>Gemini-in-Sheets</strong> as a Google Workspace sidebar (built in)</li>
</ul>
<p>Four iterations: three went well, one went spectacularly wrong. The one that went wrong teaches the most.</p>
<p><strong>Why I am showing you this:</strong> you will work with AIs. You have to know <strong>when you can trust them</strong> and when not.</p>
</section>

<h1 id="three-rules-for-working-with-ai">Three rules for working with AI</h1>
<table>
<thead>
<tr>
<th>Rule</th>
<th>What it means in practice</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Always verify.</strong></td>
<td>Never trust an AI report without checking the artefact itself. In Sheets: <code>Ctrl+End</code> (jumps to the last used cell – exposes hidden extra columns/rows), filter for suspect values. In code: <code>git diff</code>, unit tests (Claude Code can write them).</td>
</tr>
<tr>
<td><strong>Small over complex.</strong></td>
<td>Five atomic tasks beat one big one. Each step is then individually verifiable. Complex multi-step tasks fail more quietly.</td>
</tr>
<tr>
<td><strong>A report is not proof.</strong></td>
<td><em>&quot;I did X&quot;</em> is a claim. The proof lives in the artefact, not in the report about it.</td>
</tr>
</tbody>
</table>
<p>These three rules apply to every AI, not just Gemini. Including Claude Code.</p>
</section>

<h1 id="exercise-2-add-a-new-field">Exercise 2: add a new field</h1>
<p>Suggest a field (e.g. contact person, DOI, project lead).</p>
<p>Then ask Claude Code: <em>&quot;I want to store [this field] per project. Where should it go?&quot;</em></p>
<p><strong>The questions Claude Code should ask:</strong></p>
<table>
<thead>
<tr>
<th>Question</th>
<th>Answer → consequence</th>
</tr>
</thead>
<tbody>
<tr>
<td>How many contact persons per project?</td>
<td>Exactly one → <strong>wide</strong> in <code>core</code></td>
</tr>
<tr>
<td>Could there be more than one?</td>
<td>Yes → <strong>long</strong> in <code>people</code> with role <code>contact</code></td>
</tr>
<tr>
<td>Does the email need its own slot?</td>
<td>→ new column in <code>core</code>, or in <code>authority</code></td>
</tr>
</tbody>
</table>
<p><strong>Learning goal:</strong> apply the rule of thumb from Block 1 to a real case.</p>

<h1 id="step-1-convert-tabs-to-tables">Step 1: convert tabs to Tables</h1>
<p><code>Format → Convert to table</code></p>
<p><strong>What Tables give you:</strong></p>
<ul>
<li><strong>Column types</strong>: Number rejects text, Date rejects free text</li>
<li><strong>Auto-expansion</strong>: new rows inherit formatting, validation, formulas</li>
<li><strong>Named references</strong>: the table is called <code>core</code>, <code>people</code>, etc.</li>
<li><strong>Filters in the header</strong>: built in, no extra filter view</li>
</ul>
<p>Tables are not styling. They are a <strong>data object</strong> with rules.</p>
<div class="small">

<h1 id="structured-references-formulas-you-can-read">Structured References: formulas you can read</h1>
<div class="columns">
<div>
<p><strong>Classic (fragile):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=VLOOKUP(A2, core!A:B, 2,
         FALSE)
</code></pre>
<p>The <code>2</code> means &quot;second column&quot;. Breaks on every column insertion.</p>
</div>
<div>
<p><strong>With Tables (stable):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=XLOOKUP(A2,
  core[project_id],
  core[title_de], &quot;&quot;)
</code></pre>
<p>Reads like a sentence. Survives column insertions.</p>
</div>
</div>
<p>The syntax <code>core[project_id]</code> literally means: <em>&quot;the column <code>project_id</code> of the table <code>core</code>&quot;</em>.</p>

<h1 id="how-do-you-type-coreproject_id">How do you type <code>core[project_id]</code>?</h1>
<p>Not from memory. Sheets helps.</p>
<ol>
<li>Start the formula: <code>=XLOOKUP(A2,</code></li>
<li>Type the table name: <code>co...</code> → Sheets suggests <code>core</code></li>
<li>Square bracket <code>[</code> → Sheets shows all columns of the table as a list</li>
<li>Pick a column → Sheets closes the bracket <code>]</code> automatically</li>
</ol>
<p><strong>Prerequisite:</strong> the tab must have been converted to a Table via <code>Format → Convert to table</code> first. Otherwise Sheets does not know the name.</p>

<h1 id="the-locale-separator-caveat">The locale separator caveat</h1>
<div class="warn">
<p><strong>Watch out:</strong> German Sheets uses a <strong>semicolon</strong> as the argument separator (because the comma is the decimal mark, e.g. <code>3,14</code>). Other locales follow the same logic.</p>
</div>
<p>Online examples and AI output almost always use commas. Paste → <code>#ERROR!</code>.</p>
<div class="small">
<table>
<thead>
<tr>
<th>Wrong (English locale)</th>
<th>Right (German locale)</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>=XLOOKUP(A2, core[project_id], core[title_de], &quot;&quot;)</code></td>
<td><code>=XLOOKUP(A2; core[project_id]; core[title_de]; &quot;&quot;)</code></td>
</tr>
</tbody>
</table>
</div>
<p>On <code>#ERROR!</code>, replace commas with semicolons first.</p>

<h1 id="step-2-title_de-as-a-reading-aid">Step 2: title_de as a reading aid</h1>
<p>Add a formula column <code>title_de</code> after <code>project_id</code> in every long tab:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=XLOOKUP(A2; core[project_id]; core[title_de]; &quot;&quot;)
</code></pre>
<ul>
<li>New row → enter <code>project_id</code> → title appears immediately</li>
<li>Change the title in <code>core</code> → updates everywhere</li>
</ul>
<p><code>core.title_de</code> stays the <strong>source of truth</strong>, all other occurrences are derived views.</p>
</section>

<h1 id="step-2b-when-auto-expansion-does-not-kick-in">Step 2b: when auto-expansion does not kick in</h1>
<p>Google Sheets Tables normally copy formulas into new rows automatically. If they do not:</p>
<p><strong><code>Ctrl+D</code> (Fill Down)</strong> is the universal fallback.</p>
<ol>
<li>Select the cell with the working formula</li>
<li>Extend the selection down to the last row (<code>B2:Bn</code>)</li>
<li>Press <code>Ctrl+D</code></li>
</ol>
<p>The formula spreads across all selected cells, with row references adjusted. Works outside Tables too.</p>

<h1 id="step-3-three-layers-of-validation">Step 3: three layers of validation</h1>
<p>Behind every dropdown sits a <strong>source</strong>. Our Sheet has three:</p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Tab</th>
<th>Role</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>vocabulary</strong></td>
<td><code>vocabulary</code></td>
<td>closed enum lists (roles, status)</td>
</tr>
<tr>
<td><strong>authority</strong></td>
<td><code>authority</code></td>
<td>authority file with PIDs (ORCID, GND, ROR)</td>
</tr>
<tr>
<td><strong>_helpers</strong></td>
<td><code>_helpers</code></td>
<td>filtered views per type, bound to dropdowns</td>
</tr>
</tbody>
</table>
<blockquote>
<p><em>vocabulary is the rulebook, authority is the lookup, _helpers is the lens.</em></p>
</blockquote>
<p>Authority is <strong>never</strong> bound directly to a dropdown, always through <code>_helpers</code>. Why: next slide.</p>
</section>

<h1 id="reject-input-vs-show-warning">Reject input vs. show warning</h1>
<p>The data validation panel offers two modes:</p>
<div class="columns">
<div>
<p><strong>Reject input</strong></p>
<p>Red X, value is <strong>not</strong> stored.</p>
<p>For real enums where wrong values must be impossible: <code>status</code>, <code>role</code>.</p>
</div>
<div>
<p><strong>Show warning</strong></p>
<p>Red corner, value <strong>is</strong> stored.</p>
<p>For foreign IDs and authority bindings, where new values get backfilled later: <code>person</code>, <code>keyword</code>, <code>project_id</code>.</p>
</div>
</div>
<p><strong>Rule of thumb:</strong> <em>reject</em> only on real enums from <code>vocabulary</code>. Otherwise always <em>warn</em>, so the Sheet can grow without blocking.</p>
</section>

<h1 id="why-three-layers-instead-of-one">Why three layers instead of one?</h1>
<p><strong>Problem:</strong> <code>authority</code> mixes everything – people, institutions, keywords, regions. A dropdown bound directly to it would mix all types together.</p>
<p><strong>Solution:</strong> <code>_helpers</code> filters:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=FILTER(authority[label]; authority[type]=&quot;person&quot;)
</code></pre>
<p><code>person_labels</code> shows only people, <code>keyword_labels</code> only keywords. Thanks to the <strong>spill range</strong>, the list grows with the source – no manual extension.</p>
</section>

<h1 id="why-were-the-dropdowns-hard-coded">Why were the dropdowns hard-coded?</h1>
<p><strong>Gemini-in-Sheets</strong> built the dropdowns during preparation. You remember the hallucination story from Block 1 (Gemini reports success where there was none). Here a <strong>different Gemini weakness</strong> kicks in: dropdowns <em>from a range</em> are structurally not supported. Only <strong>single-value lists</strong>.</p>
<p>Google documents this themselves:</p>
<blockquote>
<p><em>&quot;Selecting from a range is not supported in Gemini's dropdown creation feature.&quot;</em></p>
</blockquote>
<p>This is not a bug, it is a <strong>structural limit</strong>. Dynamic problem (hallucination) vs. static problem (feature limit). You need to know both. That is why we now rebuild the dropdowns to use dynamic range bindings, manually.</p>
</section>

<h1 id="the-10-second-check">The 10-second check</h1>
<p>How do you tell whether a dropdown is bound correctly?</p>
<p><strong>Inside a Table</strong> (after Tables conversion): click the type icon in the column header → <em>Edit column type</em>. There you see whether the column type is <em>Drop-down</em> or <em>Drop-down (from a range)</em>.</p>
<table>
<thead>
<tr>
<th>You see ...</th>
<th>Meaning</th>
</tr>
</thead>

<h1 id="setting-up-conditional-formatting">Setting up conditional formatting</h1>
<p>Example: completed projects should colour the whole row grey.</p>
<ol>
<li>Select the data range: click into the table, <code>Ctrl+A</code> captures everything (with Tables). Otherwise manually, e.g. <code>A2:N50</code>.</li>

<h1 id="why-the--in-f2completed">Why the <code>$</code> in <code>=$F2=&quot;completed&quot;</code>?</h1>
<ul>
<li><code>$F</code> means: <em>always</em> check column F, regardless of which column the cell is in</li>
<li><code>2</code> without <code>$</code> means: adjust the row when the rule iterates over other rows</li>
</ul>
<p><strong>Result:</strong> row 2 turns grey when <code>F2 = &quot;completed&quot;</code>. The entire row, not just the status cell.</p>
<p>Without <code>$F</code>, the rule in column B would look at column B – there is no <code>status</code> there, nothing would turn grey.</p>
</section>

<h1 id="what-is-the-sheets-api">What is the Sheets API?</h1>
<p>An <strong>API</strong> (Application Programming Interface) is an interface through which programs talk to each other. The <strong>Google Sheets API</strong> lets Claude Code access the Sheet directly, without browser clicks.</p>
<div class="small">
<table>
<thead>
<tr>
<th>Chrome integration (Block 2)</th>
<th>Sheets API (pipeline)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Claude drives the browser</td>
<td>Claude queries the Sheets server directly</td>
</tr>
<tr>
<td>Good for: reading, screenshots, single edits</td>
<td>Good for: bulk reading, build pipelines</td>
</tr>
<tr>
<td>Slow, visual</td>
<td>Fast, structured</td>
</tr>
<tr>
<td>&quot;Claude in Chrome&quot; + <code>/chrome</code> resp. <code>@browser</code></td>
<td>credentials prepared in advance</td>
</tr>
</tbody>
</table>
</div>
<p>Both have their place. The API is the professional path for the build.</p>
</section>

<h1 id="script-or-skill">Script or Skill?</h1>
<p>Not every problem is a Skill problem.</p>
<table>
<thead>
<tr>
<th></th>
<th><strong>Python script</strong></th>
<th><strong>Skill</strong> (<code>SKILL.md</code>)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Input → output</td>
<td>deterministic, same on same input</td>
<td>variable, context-dependent</td>
</tr>
<tr>
<td>Failure mode</td>
<td>exception, stack trace</td>
<td>hallucination possible</td>
</tr>
<tr>
<td>Automatically testable (CI*)</td>
<td>yes</td>
<td>no</td>
</tr>
<tr>
<td>Adjustment</td>
<td>edit code, test</td>
<td>edit prompt</td>
</tr>
<tr>
<td>Hub example</td>
<td><code>build-hub-data.py</code> (Sheet → JSON)</td>
<td><code>/explain-model</code>, <code>/enrich-authority</code></td>
</tr>
</tbody>
</table>
<p><strong>Rule:</strong> <em>same input → same result = script. Claude's judgement is part of the value = Skill.</em></p>
<div class="small">
<p>*CI = Continuous Integration. Automated test runs on <code>git push</code>. Scripts run there, Skills do not.</p>
</div>
</section>

<h1 id="prerequisite-skill-creator">Prerequisite: /skill-creator</h1>
<p>You don't simply write a Skill into a Markdown file. Anthropic ships a <strong>meta-Skill</strong> for this: <code>/skill-creator</code>. It knows what a good Skill looks like.</p>
<p>It takes care of:</p>
<ul>
<li>clean frontmatter (<code>name</code>, <code>description</code>)</li>
<li>a precise <code>description</code> – this is how Claude knows when the Skill should fire</li>
<li>progressive disclosure (details in helper files, not everything in <code>SKILL.md</code>)</li>
</ul>
<p>Without <code>/skill-creator</code>, Claude writes a Markdown file that <em>looks</em> like a Skill. With <code>/skill-creator</code>, it becomes one.</p>
</section>

<p>We build a <strong>Skill</strong>, not a script. The difference:</p>
<ul>

<p><strong>The Skill advantage:</strong> natural-language explanation for editor work, not just error codes. A pure checker would be better as a Python script.</p>

<h1 id="mcp-plugins-new-capabilities">MCP plugins: new capabilities</h1>
<p>Skills tell Claude Code <strong>what</strong> to do. <strong>MCP plugins</strong> give Claude Code new <strong>tools</strong>.</p>
<p>MCP = <strong>Model Context Protocol</strong>, a standard for the wire between AI and external services.</p>
<p>Examples: <strong>Google Sheets MCP</strong> (API access to the Sheet), <strong>ORCID API plugin</strong> (researcher IDs), <strong>GitHub MCP</strong> (issues/PRs).</p>
<p>The Chrome integration from Block 2 is <strong>not</strong> an MCP plugin, it's built in natively. You don't have to build plugins yourselves – the important thing is to know they exist.</p>
</section>

<h1 id="block-4-takeaways">Block 4: takeaways</h1>
<ul>
<li><strong>Skills</strong> = prompt wrappers for workflows that need Claude's judgement. <code>.md</code> files in <code>.claude/skills/</code>.</li>
<li><strong>Scripts</strong> = deterministic automation (Python, shell). Claude Code writes and maintains them, but they are <strong>not</strong> Skills.</li>
<li><strong>Rule of thumb:</strong> same input, same output → script. Judgement needed → Skill.</li>
<li><strong>MCP plugins</strong> = new tools (APIs, Sheet access). They exist, you don't have to build them.</li>
<li><strong>CLAUDE.md</strong> = project memory. Claude Code &quot;knows&quot; only what is written there.</li>
</ul>
</section>

<h1 id="learnings">Learnings</h1>
<ul>
<li>Describe and justify a data model as a <strong>hybrid of wide + long</strong></li>
<li>Apply the rule of thumb: singleton → wide, many-to-many → long</li>
<li>Set up dropdowns that bind to <code>vocabulary</code> or <code>_helpers</code></li>
<li>Create filter views and grouping views per project</li>
<li>Use Claude Code to <strong>read, explain, extend, validate</strong> a model</li>
<li>Run the flow <strong>Sheets → Claude Code (API) → <code>projects.json</code> → Hub</strong> yourselves</li>
<li>Recognise Skills as reusable instructions and <strong>formulate your own ideas</strong></li>
<li><strong>Verify AI results</strong> instead of trusting self-reports</li>
</ul>
</section>

<h1 id="the-bigger-picture">The bigger picture</h1>
<p><strong>Sheets is the editor, not the model.</strong><br />
The power (joins, enrichment, PIDs) emerges at build time in Claude Code.</p>
<p><strong>The data model is not a one-shot.</strong><br />
Pilot experiment → hybrid model: exactly that kind of conversation. Intermediate steps are not failures.</p>
<p><strong>Controlled vocabulary + authority lookup</strong> is the one place where normalisation makes sense. Everything else is allowed to be flat and readable.</p>
<p><strong>Think validation!</strong> Check every AI result against the artefact – Sheet content, git diff, file state. Self-reports are claims, not proofs.</p>
</section>
