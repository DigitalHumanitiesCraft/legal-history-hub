<td>Findable, Accessible, Interoperable, Reusable (Datenqualitäts-Prinzip)</td>
</tr>
<tr>
<td><strong>PID</strong></td>
<td>Persistent Identifier, z.B. ORCID, GND, ROR, Wikidata-Q-Nummer</td>

<tr>
<td><strong>Normdatei / Authority</strong></td>
<td>zentrale Liste mit Namen und ihren IDs</td>
</tr>
<tr>
<td><strong>Foreign Key</strong></td>
<td>Verweis in eine andere Tabelle (hier: <code>project_id</code>)</td>
</tr>
<tr>
<td><strong>Junction Table</strong></td>
<td>Tabelle, die eine Many-to-Many-Beziehung auflöst</td>
</tr>
<tr>
<td><strong>Many-to-Many</strong></td>
<td>Ein Projekt hat viele Personen, eine Person viele Projekte</td>

<h1 id="begriffe-die-heute-fallen-werden-22">Begriffe, die heute fallen werden (2/2)</h1>
<div class="small">
<table>
<thead>
<tr>
<th>Begriff</th>
<th>Kurz</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Singleton</strong></td>
<td>Feld mit genau einem Wert pro Entität (z.B. Titel)</td>
</tr>
<tr>
<td><strong>Source of Truth</strong></td>
<td>die eine Stelle, an der der richtige Wert steht</td>
</tr>
<tr>
<td><strong>Wide / Long / Tidy</strong></td>
<td>Daten-Formate (kommen gleich ausführlich)</td>
</tr>
<tr>
<td><strong>1NF</strong></td>
<td>First Normal Form: in jeder Zelle steht genau ein Wert</td>
</tr>
<tr>
<td><strong>Enum</strong></td>
<td>Geschlossene Werteliste (z.B. status: <code>active</code>, <code>completed</code>, <code>planned</code>)</td>
</tr>
<tr>
<td><strong>Spill Range</strong></td>
<td>Formel, die automatisch mehrere Ergebniszeilen ausfüllt</td>
</tr>
</tbody>
</table>
</div>
<p>Diese beiden Folien bleiben als Referenz. Beim Zurückblättern findet ihr hier die Definitionen.</p>

<h1 id="das-pilot-experiment-der-erste-anlauf">Das Pilot-Experiment: der erste Anlauf</h1>
<p>Zwischen WS2 und WS3 hat <strong>Polina ein eigenes Datenmodell</strong> als Experiment gebaut. <a href="https://docs.google.com/spreadsheets/d/1g0CO-ms4gNKibiG_xIICaiXOC5X2nF3AymloA1iTCoU/">→ Polinas Pilot-Sheet</a></p>
<p><strong>6 Tabs, relational normalisiert:</strong> eigene Tabs für Projekte, Personen, Organisationen, Themen, Keywords und Regionen.</p>
<p><strong>Konzeptuell sauber:</strong> eigene IDs (<code>pers-003</code>, <code>subj-001</code>), ORCIDs, GND-Nummern. Das ist <strong>relationales Denken</strong> und grundsätzlich richtig.</p>

<h1 id="was-am-pilot-modell-richtig-war">Was am Pilot-Modell richtig war</h1>
<p><img src="ws3-img/pilot-persons.png" alt="persons-Tab mit eigenen IDs und ORCIDs" /></p>
<p>Jede Person hat eine eigene ID und eine <strong>ORCID</strong> (Persistent Identifier für Forschende). Das ist <strong>FAIR-konform</strong> (Findable, Accessible, Interoperable, Reusable, Wilkinson et al. 2016): PIDs machen Daten findbar und verlinkbar. Diese Idee übernehmen wir.</p>
<div class="small">
<p>Wilkinson, M. D. et al. „The FAIR Guiding Principles for scientific data management and stewardship.&quot; <em>Scientific Data</em> 3, 2016. <a href="https://doi.org/10.1038/sdata.2016.18">https://doi.org/10.1038/sdata.2016.18</a></p>
</div>
</section>

<h1 id="wo-es-hakt-separator-listen">Wo es hakt: Separator-Listen</h1>
<p><img src="ws3-img/pilot-creator.png" alt="creator-Spalte mit Pipe-Notation in einer Zelle" /></p>
<p>Die Formelleiste zeigt den Inhalt von <strong>einer einzigen Zelle</strong>: 9 Personen mit Rollen, getrennt durch Semikolons und Pipes.</p>
<p>Für Google Sheets ist das <strong>ein Text-String</strong>. Nicht filterbar (kein Dropdown „nur PIs zeigen&quot;), nicht sortierbar (keine Reihenfolge nach Nachname), nicht zählbar (keine Funktion, die sagt: 9 Personen).</p>
</section>

<h1 id="warum-ist-das-ein-problem">Warum ist das ein Problem?</h1>
<p>In der Datenbanktheorie gibt es eine Regel namens <strong>1. Normalform (1NF)</strong>:</p>
<blockquote>
<p><em>„An entry in a table is not decomposable.&quot;</em><br />
– Edgar F. Codd, <em>A Relational Model of Data for Large Shared Data Banks</em>, 1970.</p>
</blockquote>
<p>Codd war IBM-Forscher und hat die relationalen Datenbanken erfunden. Seine Regel heißt: <strong>In einer Zelle steht genau ein Wert.</strong> Keine Listen, keine Trennzeichen.</p>
<p><img src="ws3-img/pilot-keywords.png" alt="keywords_de-Spalte mit Semikolon-Listen" /></p>
<p>Dasselbe Muster überall. In echten Datenbanken funktioniert das, weil die Datenbank intern parst. <strong>Sheets ist keine Datenbank.</strong></p>
</section>

<h1 id="warum-viele-spalten-auch-nicht-helfen">Warum viele Spalten auch nicht helfen</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>| project_id | person_1 | role_1 | person_2 | role_2 | ... | person_15 |
|------------|----------|--------|----------|--------|-----|-----------|
| proj-001   | Duve     | PI     | L-B      | PI     | ... |           |
</code></pre>
<p>Wie viele Spaltenpaare reichen? Bei 3 Personen sind 12 Spalten leer. Bei 20 müsste man die Tabellenstruktur ändern.</p>
<p>Eine Tabelle voller leerer Zellen, endloses Scrollen nach rechts, starre Obergrenze. In der DB-Theorie: <strong>Repeating Groups</strong> (Codd 1970).</p>

<h1 id="drei-formate-im-vergleich">Drei Formate im Vergleich</h1>
<div class="small">
<table>
<thead>
<tr>
<th>Format</th>
<th>Wie es aussieht</th>
<th>Problem</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Wide + Separator-Listen</strong></td>
<td><code>creator = &quot;Duve, T.; L-B, M.&quot;</code> in einer Zelle</td>
<td>Sheets sieht nur Text, kein Filtern/Zählen</td>
</tr>
<tr>
<td><strong>Relational normalisiert</strong></td>
<td>Eigene Personen-Tabelle, nur IDs in Projekten</td>
<td>Sheets kann keine Joins, Menschen müssen mental verknüpfen</td>
</tr>
<tr>
<td><strong>Hybrid (wide + long)</strong></td>
<td>Wide für Singletons, Long-Tab für Beziehungen</td>
<td>Redundanz in Titel-Spalten, dafür Sheets-tauglich</td>
</tr>
</tbody>
</table>
</div>
<p>Das Pilot-Modell war Format 2 (plus Separator-Listen). Wir bauen heute Format 3.</p>
<p><strong>Warum nicht Format 2?</strong> Weil Sheets Nutzer-Oberfläche ist, nicht Datenbank. Menschen lesen, klicken, filtern. Joins gibt es nicht.</p>
</section>

<h1 id="die-l%C3%B6sung-eigener-tab-im-long-format">Die Lösung: eigener Tab im Long-Format</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>| project_id | person              | role               |

| proj-001   | Duve, Thomas        | PI                 |
| proj-001   | Lutz-Bachmann, M.   | PI                 |
| proj-001   | König, Florian      | researcher         |
| proj-002   | Collin, Peter       | PI                 |
</code></pre>
<p>Eine Zeile pro Person-Projekt-Rolle. Das nennt man <strong>Long-Format</strong>.</p>
<blockquote>
<p><em>„Each variable is a column, each observation is a row.&quot;</em> – Hadley Wickham, <em>Tidy Data</em>, 2014.</p>
</blockquote>
<p>Der Tab selbst ist eine <strong>Junction Table</strong>: eine Tabelle, die eine Many-to-Many-Beziehung auflöst.</p>

<h1 id="wide-vs-long-zwei-formate">Wide vs. Long: zwei Formate</h1>
<div class="columns">
<div>
<p><strong>Wide (breit)</strong></p>
<ul>
<li>Eine Zeile pro Projekt</li>
<li>Viele Spalten nebeneinander</li>
<li>Gut für <strong>Singletons</strong>: Felder mit genau einem Wert (Titel, Status, Jahr)</li>
<li>Beispiel: unser <code>core</code>-Tab</li>
</ul>
</div>
<div>
<p><strong>Long (lang, tidy)</strong></p>
<ul>
<li>Eine Zeile pro Beziehung/Fakt</li>
<li>Wenige Spalten, viele Zeilen</li>
<li>Gut für <strong>Many-to-Many</strong>: Felder mit vielen Werten (Personen, Keywords)</li>
<li>Beispiel: unser <code>people</code>-Tab</li>
</ul>
</div>
</div>
<p>Menschen lesen wide gut. Sheets-Funktionen (Filter, Sortieren, Gruppieren) funktionieren auf long gut. Unser Hybrid bedient beide.</p>
</section>

<h1 id="was-wir-aus-dem-pilot-experiment-gelernt-haben">Was wir aus dem Pilot-Experiment gelernt haben</h1>
<ol>
<li>
<p><strong>Relationales Denken ist wertvoll.</strong> Eigene IDs, ORCIDs, Lookup-Tabellen. Das behalten wir.</p>
</li>
<li>
<p><strong>Separator-Listen passen nicht zu Sheets.</strong> Die <code>creator</code>-Spalte mit 9 Pipe-getrennten Einträgen ist für Menschen und für Sheets unbrauchbar.</p>
</li>
<li>
<p><strong>Sheets ist ein Editor, nicht eine Datenbank.</strong> Das Datenmodell muss für Menschen geschrieben sein. Die Mächtigkeit (Joins, Enrichment) entsteht zur Build-Zeit in Claude Code.</p>
</li>
</ol>
<p>Modellierung ist ein Gespräch, kein einmaliger Wurf.</p>
</section>

<h1 id="drei-merks%C3%A4tze-f%C3%BCr-den-umgang-mit-ki">Drei Merksätze für den Umgang mit KI</h1>
<table>
<thead>
<tr>
<th>Regel</th>
<th>Heißt konkret</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Verifiziere immer.</strong></td>
<td>Nie einem KI-Bericht glauben ohne das Artefakt selbst zu prüfen. Im Sheet: <code>Ctrl+End</code> (springt zur letzten benutzten Zelle – entlarvt heimliche Extra-Spalten/-Zeilen), Filter auf Verdachts-Werte. Im Code: <code>git diff</code>, Unit-Tests (kann Claude Code selbst schreiben).</td>
</tr>
<tr>
<td><strong>Klein statt komplex.</strong></td>
<td>Lieber 5 atomare Aufträge als einen großen. Jeder Schritt ist dann einzeln prüfbar. Komplexe Mehrschritt-Aufträge scheitern leiser.</td>
</tr>
<tr>
<td><strong>Ein Bericht ist kein Beweis.</strong></td>
<td><em>„Ich habe X erledigt&quot;</em> ist eine Behauptung. Der Beweis liegt im Artefakt, nicht im Report darüber.</td>
</tr>
</tbody>
</table>
<p>Diese drei Regeln gelten für jede KI, nicht nur für Gemini. Auch für Claude Code.</p>
</section>

<h1 id="%C3%BCbung-2-ein-neues-feld-einbauen">Übung 2: Ein neues Feld einbauen</h1>
<p>Schlagt ein Feld vor (z.B. Kontaktperson, DOI, Projektleitung).</p>
<p>Dann fragt Claude Code: <em>„Ich möchte [dieses Feld] pro Projekt speichern. Wohin soll das?&quot;</em></p>
<p><strong>Die Fragen, die Claude Code stellen sollte:</strong></p>
<table>
<thead>
<tr>
<th>Frage</th>
<th>Antwort → Konsequenz</th>
</tr>
</thead>
<tbody>
<tr>
<td>Wie viele Kontaktpersonen pro Projekt?</td>
<td>Genau eine → <strong>wide</strong> in <code>core</code></td>
</tr>

<h1 id="structured-references-formeln-die-man-lesen-kann">Structured References: Formeln, die man lesen kann</h1>

<div>
<p><strong>Mit Tables (stabil):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=XLOOKUP(A2;

</div>
</div>

<h1 id="wie-tippt-man-coreproject_id">Wie tippt man <code>core[project_id]</code>?</h1>
<p>Nicht auswendig. Sheets hilft.</p>
<ol>
<li>Formel anfangen: <code>=XLOOKUP(A2;</code></li>
<li>Tabellennamen tippen: <code>co...</code> → Sheets schlägt <code>core</code> vor</li>
<li>Eckige Klammer <code>[</code> → Sheets zeigt alle Spalten der Tabelle als Liste</li>
<li>Spalte auswählen → Sheets schließt die Klammer <code>]</code> automatisch</li>
</ol>
<p><strong>Voraussetzung:</strong> Der Tab muss vorher mit <code>Format → In Tabelle konvertieren</code> zu einer Table gemacht worden sein. Sonst kennt Sheets den Namen nicht.</p>

<h1 id="das-semikolon-problem">Das Semikolon-Problem</h1>
<div class="warn">
<p><strong>Achtung:</strong> Deutsches Sheets verwendet <strong>Semikolon</strong> als Argument-Trenner (weil Komma das Dezimaltrennzeichen ist, z.B. <code>3,14</code>).</p>
</div>
<p>Online-Beispiele und KI-Output nutzen fast immer Kommas. Kopieren → <code>#ERROR!</code>.</p>
<div class="small">
<table>
<thead>
<tr>
<th>Falsch (englisch)</th>
<th>Richtig (deutsch)</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>=XLOOKUP(A2, core[project_id], core[title_de], &quot;&quot;)</code></td>
<td><code>=XLOOKUP(A2; core[project_id]; core[title_de]; &quot;&quot;)</code></td>
</tr>
</tbody>
</table>
</div>
<p>Bei <code>#ERROR!</code> zuerst Kommas durch Semikolons ersetzen.</p>
</section>

<h1 id="schritt-2-title_de-als-lesehilfe">Schritt 2: title_de als Lesehilfe</h1>
<p>In jedem Long-Tab eine Formel-Spalte <code>title_de</code> nach <code>project_id</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=XLOOKUP(A2; core[project_id]; core[title_de]; &quot;&quot;)
</code></pre>
<ul>
<li>Neue Zeile einfügen → <code>project_id</code> eingeben → Titel erscheint sofort</li>
<li>Titel im <code>core</code> ändern → aktualisiert sich überall</li>
</ul>
<p><code>core.title_de</code> bleibt <strong>Source of Truth</strong>, alle anderen Vorkommen sind Abbildungen davon.</p>
</section>

<h1 id="schritt-2b-wenn-auto-expansion-nicht-greift">Schritt 2b: Wenn Auto-Expansion nicht greift</h1>
<p>Google Sheets Tables kopieren Formeln normalerweise automatisch in neue Zeilen. Falls nicht:</p>
<p><strong><code>Ctrl+D</code> (Fill Down)</strong> ist der universelle Fallback.</p>
<ol>
<li>Zelle mit der funktionierenden Formel markieren</li>
<li>Bereich nach unten bis zur letzten Zeile erweitern (<code>B2:Bn</code>)</li>
<li><code>Ctrl+D</code> drücken</li>
</ol>
<p>Die Formel verteilt sich auf alle markierten Zellen, mit an die Zeile angepassten Referenzen. Funktioniert auch außerhalb von Tables.</p>
</section>

<h1 id="schritt-3-drei-stufen-der-validierung">Schritt 3: Drei Stufen der Validierung</h1>
<p>Hinter jedem Dropdown steht eine <strong>Quelle</strong>. Unser Sheet hat drei:</p>
<table>
<thead>
<tr>
<th>Stufe</th>
<th>Tab</th>
<th>Rolle</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>vocabulary</strong></td>
<td><code>vocabulary</code></td>
<td>Geschlossene Enum-Listen (Rollen, Status)</td>
</tr>
<tr>
<td><strong>authority</strong></td>
<td><code>authority</code></td>
<td>Normdatei mit PIDs (ORCID, GND, ROR)</td>
</tr>
<tr>
<td><strong>_helpers</strong></td>
<td><code>_helpers</code></td>
<td>Gefilterte Sichten pro Typ, an die Dropdowns gebunden sind</td>
</tr>
</tbody>
</table>
<blockquote>
<p><em>vocabulary ist Vorschrift, authority ist Nachschlagewerk, _helpers ist die Brille.</em></p>
</blockquote>
<p>Authority wird <strong>nie direkt</strong> an ein Dropdown gebunden, sondern immer über <code>_helpers</code>. Warum: nächste Folie.</p>
</section>

<h1 id="eingabe-ablehnen-vs-warnung-anzeigen">Eingabe ablehnen vs. Warnung anzeigen</h1>
<p>Im Datenvalidierungs-Panel gibt es zwei Modi:</p>
<div class="columns">
<div>
<p><strong>Eingabe ablehnen</strong></p>
<p>Rotes X, Wert wird <strong>nicht</strong> gespeichert.</p>
<p>Für echte Enums, wo falsche Werte unmöglich sein sollen: <code>status</code>, <code>role</code>.</p>
</div>
<div>
<p><strong>Warnung anzeigen</strong></p>
<p>Rote Ecke, Wert <strong>wird</strong> gespeichert.</p>
<p>Für Fremd-IDs und Authority-Bindungen, wo neue Werte später nachgetragen werden: <code>person</code>, <code>keyword</code>, <code>project_id</code>.</p>
</div>
</div>
<p><strong>Faustregel:</strong> <em>Ablehnen</em> nur bei echten Enums aus <code>vocabulary</code>. Sonst immer <em>Warnung</em>, damit das Sheet wachsen darf, ohne zu blockieren.</p>
</section>

<h1 id="warum-drei-stufen-statt-einer">Warum drei Stufen statt einer?</h1>
<p><strong>Problem:</strong> <code>authority</code> enthält alles durcheinander – Personen, Institutionen, Keywords, Regionen. Ein Dropdown direkt darauf würde alle Typen vermischen.</p>
<p><strong>Lösung:</strong> <code>_helpers</code> filtert:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>=FILTER(authority[label]; authority[type]=&quot;person&quot;)
</code></pre>
<p><code>person_labels</code> zeigt nur Personen, <code>keyword_labels</code> nur Keywords. Dank <strong>Spill Range</strong> wächst die Liste mit der Quelle – ohne Nachziehen.</p>
</section>

<h1 id="warum-waren-die-dropdowns-hartkodiert">Warum waren die Dropdowns hartkodiert?</h1>
<p><strong>Gemini-in-Sheets</strong> hat die Dropdowns in der Vorbereitung gebaut. Ihr erinnert euch an die Halluzinations-Story aus Block 1 (Gemini meldet Erfolg, wo keiner war). Hier kommt eine <strong>andere Gemini-Schwäche</strong> dazu: Dropdowns <em>aus einem Bereich</em> kann es strukturell nicht. Nur <strong>Einzelwerte-Listen</strong>.</p>
<p>Google dokumentiert das selbst:</p>
<blockquote>
<p><em>„Selecting from a range is not supported in Gemini's dropdown creation feature.&quot;</em></p>
</blockquote>
<p>Das ist kein Bug, sondern ein <strong>strukturelles Limit</strong>. Dynamisches Problem (Halluzination) vs. statisches Problem (Feature-Grenze). Beide muss man kennen. Deshalb bauen wir die Dropdowns jetzt auf dynamische Bereichs-Bindung um, manuell.</p>
</section>

<h1 id="der-10-sekunden-check">Der 10-Sekunden-Check</h1>
<p>Wie erkennst du, ob ein Dropdown richtig gebunden ist?</p>
<p><strong>In einer Table</strong> (seit Tables-Konvertierung): am Spaltenkopf auf das Typ-Symbol klicken → <em>Spaltentyp bearbeiten</em>. Dort siehst du, ob der Spaltentyp <em>Drop-down</em> oder <em>Drop-down (aus Bereich)</em> ist.</p>
<table>
<thead>
<tr>
<th>Du siehst ...</th>
<th>Bedeutung</th>
</tr>
</thead>
<tbody>
<tr>
<td><em>„Drop-down&quot;</em> (Einzelwerte-Liste)</td>
<td><strong>Hartkodiert</strong>. Umbauen!</td>
</tr>
<tr>
<td><em>„Drop-down (aus Bereich)&quot;</em> mit Referenz wie <code>vocabulary[person_roles]</code></td>
<td><strong>Dynamisch gebunden</strong>. Richtig.</td>
</tr>
</tbody>
</table>
<p>Alternativ außerhalb von Tables: <em>Daten → Datenvalidierung</em> zeigt dasselbe. Diesen Check könnt ihr auf jedes Sheet anwenden.</p>

<h1 id="warum-das--in-f2completed">Warum das <code>$</code> in <code>=$F2=&quot;completed&quot;</code>?</h1>
<ul>
<li><code>$F</code> heißt: <em>immer</em> Spalte F prüfen, egal in welcher Spalte die Zelle liegt</li>
<li><code>2</code> ohne <code>$</code> heißt: pass die Zeile an, wenn die Regel auf andere Zeilen zieht</li>
</ul>
<p><strong>Ergebnis:</strong> Zeile 2 wird grau, wenn <code>F2 = &quot;completed&quot;</code>. Ganze Zeile, nicht nur die Status-Zelle.</p>
<p>Ohne <code>$F</code> würde die Regel in Spalte B auf Spalte B schauen – dort steht kein <code>status</code>, nichts würde grau.</p>
</section>

<h1 id="was-ist-die-sheets-api">Was ist die Sheets API?</h1>
<p>Eine <strong>API</strong> (Application Programming Interface) ist eine Schnittstelle, über die Programme miteinander reden. Die <strong>Google Sheets API</strong> lässt Claude Code direkt aufs Sheet zugreifen, ohne Browser-Klicks.</p>
<div class="small">
<table>
<thead>
<tr>
<th>Chrome-Integration (Block 2)</th>
<th>Sheets API (Pipeline)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Claude steuert den Browser</td>
<td>Claude fragt den Sheets-Server direkt</td>
</tr>
<tr>
<td>Gut für: lesen, Screenshots, einzelne Edits</td>
<td>Gut für: Massen-Lesen, Build-Pipeline</td>
</tr>
<tr>
<td>Langsam, visuell</td>
<td>Schnell, strukturiert</td>
</tr>
<tr>
<td>„Claude in Chrome&quot; + <code>/chrome</code> bzw. <code>@browser</code></td>
<td>Credentials vorab vorbereitet</td>
</tr>
</tbody>
</table>
</div>
<p>Beide haben ihren Platz. Die API ist der Profi-Weg für den Build.</p>
</section>

<h1 id="script-oder-skill">Script oder Skill?</h1>
<p>Nicht jedes Problem ist ein Skill-Problem.</p>
<table>
<thead>
<tr>
<th></th>
<th><strong>Python-Script</strong></th>
<th><strong>Skill</strong> (<code>SKILL.md</code>)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Input → Output</td>
<td>deterministisch, gleich bei gleichem Input</td>
<td>variabel, kontextabhängig</td>
</tr>
<tr>
<td>Fehlermodus</td>
<td>Exception, Stacktrace</td>
<td>Halluzination möglich</td>
</tr>
<tr>
<td>Automatisch testbar (CI*)</td>
<td>ja</td>
<td>nein</td>
</tr>
<tr>
<td>Anpassung</td>
<td>Code editieren, testen</td>
<td>Prompt editieren</td>
</tr>
<tr>
<td>Hub-Beispiel</td>
<td><code>build-hub-data.py</code> (Sheet → JSON)</td>
<td><code>/explain-model</code>, <code>/enrich-authority</code></td>
</tr>
</tbody>
</table>
<p><strong>Regel:</strong> <em>Gleicher Input → gleiches Ergebnis = Script. Claudes Urteil ist Teil des Werts = Skill.</em></p>
<div class="small">
<p>*CI = Continuous Integration. Automatische Test-Läufe bei <code>git push</code>. Scripts laufen dort, Skills nicht.</p>
</div>
</section>

<h1 id="voraussetzung-skill-creator">Voraussetzung: /skill-creator</h1>
<p>Skills schreibt man nicht einfach in eine Markdown-Datei. Anthropic liefert dafür einen <strong>Meta-Skill</strong>: <code>/skill-creator</code>. Er weiß, wie ein guter Skill aussieht.</p>
<p>Er kümmert sich um:</p>
<ul>
<li>saubere Frontmatter (<code>name</code>, <code>description</code>)</li>
<li>eine präzise <code>description</code> – daran erkennt Claude, wann der Skill feuern soll</li>
<li>progressive disclosure (Details in Unterdateien, nicht alles in <code>SKILL.md</code>)</li>
</ul>
<p>Ohne <code>/skill-creator</code> schreibt Claude ein Markdown, das <em>aussieht</em> wie ein Skill. Mit <code>/skill-creator</code> wird es einer.</p>

<h1 id="mcp-plugins-neue-f%C3%A4higkeiten">MCP-Plugins: neue Fähigkeiten</h1>
<p>Skills sagen Claude Code <strong>was</strong> es tun soll. <strong>MCP-Plugins</strong> geben Claude Code neue <strong>Werkzeuge</strong>.</p>
<p>MCP = <strong>Model Context Protocol</strong>, ein Standard für den Draht zwischen KI und externen Diensten.</p>
<p>Beispiele: <strong>Google-Sheets-MCP</strong> (API-Zugriff aufs Sheet), <strong>ORCID-API-Plugin</strong> (Forscher-Kennungen), <strong>GitHub-MCP</strong> (Issues/PRs).</p>
<p>Die Chrome-Integration aus Block 2 ist <strong>kein</strong> MCP-Plugin, sondern nativ eingebaut. Ihr müsst Plugins nicht selbst bauen – wichtig ist nur zu wissen, dass es sie gibt.</p>
</section>

<h1 id="block-4-was-mitnehmen">Block 4: Was mitnehmen?</h1>
<ul>
<li><strong>Skills</strong> = Prompt-Wrapper für Workflows mit Claudes Urteil. <code>.md</code>-Dateien in <code>.claude/skills/</code>.</li>
<li><strong>Scripts</strong> = deterministische Automatisierung (Python, Shell). Claude Code schreibt und pflegt sie, aber sie sind <strong>keine Skills</strong>.</li>
<li><strong>Faustregel:</strong> gleicher Input, gleicher Output → Script. Urteil nötig → Skill.</li>
<li><strong>MCP-Plugins</strong> = neue Werkzeuge (APIs, Sheets-Zugriff). Existieren, ihr müsst sie nicht bauen.</li>
<li><strong>CLAUDE.md</strong> = Projektgedächtnis. Claude Code „weiß&quot; nur, was dort steht.</li>
</ul>
</section>

<h1 id="learnings">Learnings</h1>
<ul>
<li>Ein Datenmodell als <strong>Hybrid aus wide + long</strong> beschreiben und begründen</li>
<li>Die Faustregel anwenden: Singleton → wide, Many-to-Many → long</li>
<li>Dropdowns einrichten, die auf <code>vocabulary</code> oder <code>_helpers</code> verweisen</li>
<li>Filter Views und Gruppieren-Ansichten pro Projekt anlegen</li>
<li>Mit Claude Code ein Modell <strong>lesen, erklären lassen, erweitern, validieren</strong></li>
<li>Den Flow <strong>Sheets → Claude Code (API) → <code>projects.json</code> → Hub</strong> selbst durchführen</li>
<li>Skills als wiederverwendbare Arbeitsanweisungen erkennen und <strong>eigene Ideen formulieren</strong></li>
<li><strong>KI-Ergebnisse verifizieren</strong>, statt Self-Reports zu glauben</li>
</ul>
</section>

<h1 id="das-gr%C3%B6%C3%9Fere-bild">Das größere Bild</h1>
<p><strong>Sheets ist der Editor, nicht das Modell.</strong><br />
Die Mächtigkeit (Joins, Enrichment, PIDs) entsteht zur Build-Zeit in Claude Code.</p>
<p><strong>Das Datenmodell ist kein einmaliger Wurf.</strong><br />
Pilot-Experiment → Hybrid-Modell: genau so ein Gespräch. Zwischenschritte sind keine Fehler.</p>
<p><strong>Kontrolliertes Vokabular + Authority-Lookup</strong> ist die eine Stelle, an der Normalisierung Sinn macht. Alles andere darf flach und lesbar sein.</p>
<p><strong>An Validierung denken!</strong> Jedes KI-Ergebnis gegen das Artefakt prüfen – Sheet-Inhalt, Git-Diff, Dateistand. Self-Reports sind Behauptungen, nicht Beweise.</p>
</section>
